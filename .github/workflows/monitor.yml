name: LZT Market Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lzt-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (one-shot)
        env:
          LZT_API_TOKEN: ${{ secrets.LZT_API_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LZT_SEARCH_URL: ${{ secrets.LZT_SEARCH_URL }}
          RUN_ONCE: '1'
        run: python lzt_monitor.py

      - name: Commit updated state
        run: |
          if [[ -z "$(git status --porcelain seen_items.json)" ]]; then
            echo "No state change to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_items.json
          git commit -m "Update seen_items.json [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt). Rebasing and retrying..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
          done
          echo "Failed to push after 5 attempts"
          exit 1
